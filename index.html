<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Society of One</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wdth,wght@0,75..100,400..700;1,75..100,400..700&family=Instrument+Serif:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700"
    />

    <style>
      :root {
        --sans: Instrument Sans;
        --serif: Instrument Serif;
        --mono: Courier Prime;
      }

      html {
        font: medium var(--sans);
        color-scheme: light dark;
        scroll-behavior: smooth;
      }

      body {
        margin: auto;
        max-width: 64ch;
        padding-inline: 1ch;
      }

      article {
        padding-block: 1lh;
      }

      footer {
        min-block-size: 50vb;
      }

      a {
        text-underline-offset: 0.1ex;
        text-decoration-thickness: from-font;
      }

      h1 {
        font: italic xxx-large var(--serif);
        text-align: center;
        position: sticky;
        top: 0;
      }

      h2 {
        font: xx-large var(--serif);
        text-align: center;
        position: sticky;
        top: 0;
      }

      h3 {
        font: condensed x-large var(--sans);
        text-transform: uppercase;
        text-align: center;
        position: sticky;
        top: 0;
      }

      hr {
        border: none;
        &::after {
          display: block;
          content: "— § —";
          font: large var(--serif);
          text-align: center;
        }
      }

      p {
        font: large var(--sans);
        hyphens: auto;
        line-height: 1.5;
        text-align: justify;
      }

      pre {
        font: medium var(--mono);
      }

      code {
        font-family: var(--mono);
      }
    </style>

    <script type="module">
      import { marked } from "https://esm.sh/marked"
      import { markedSmartypantsLite } from "https://esm.sh/marked-smartypants-lite"

      const response = await fetch("README.md")
      const markdown = await response.text()
      const html = marked.use(markedSmartypantsLite()).parse(markdown)
      document.querySelector("main").innerHTML = html
    </script>
  </head>
  <body>
    <header>
      <a href="mailto:taronomy@gmail.com"><code>taronomy@gmail.com</code></a>
    </header>
    <main>
      <p>Loading &hellip;</p>
    </main>
    <footer>
      <a href="mailto:taronomy@gmail.com"><code>taronomy@gmail.com</code></a>
    </footer>
  </body>
</html>
