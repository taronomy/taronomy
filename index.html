<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Society of One</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wdth,wght@0,75..100,400..700;1,75..100,400..700&family=Instrument+Serif:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700"
      rel="stylesheet"
    />
    <style>
      html {
        color-scheme: light dark;
        font: medium Instrument Sans;
        hyphens: auto;
      }

      body {
        margin: auto;
        padding-inline: 0.5rem;
        padding-block-end: 50vh;
        max-width: 64ch;
      }

      h1 {
        font: italic xxx-large Instrument Serif;
        text-align: center;
      }

      h2 {
        font: xx-large Instrument Serif;
        text-align: center;
      }

      h3 {
        font: condensed x-large Instrument Sans;
        font-feature-settings: normal;
        text-transform: uppercase;
        text-align: center;
      }

      p {
        font: large Instrument Sans;
      }

      pre,
      code {
        font: medium Courier Prime;
      }
    </style>

    <script type="module">
      import { marked } from "https://unpkg.com/marked"

      render("/README.md")

      async function render(file) {
        const response = await fetch(file)
        if (!response.ok) return
        const markdown = await response.text()
        const html = marked.parse(markdown)
        document.body.innerHTML = html
      }
    </script>
  </head>
  <body>
    <p>Loading &hellip;</p>
    <p>
      <a href="/README.md">Read now</a>
    </p>
  </body>
</html>
