<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Society of One</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wdth,wght@0,75..100,400..700;1,75..100,400..700&family=Instrument+Serif:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700"
      rel="stylesheet"
    />
    <style>
      :root {
        --sans: Instrument Sans;
        --serif: Instrument Serif;
        --mono: Courier Prime;
      }

      html {
        font: medium var(--sans);
        hyphens: auto;
        color-scheme: light dark;
      }

      body {
        margin: auto;
        padding-inline: 1rch;
        padding-block-end: 50vh;
        max-width: 64ch;
      }

      h1 {
        font: italic xxx-large var(--serif);
        text-align: center;
      }

      h2 {
        font: xx-large var(--serif);
        text-align: center;
      }

      h3 {
        font: condensed x-large var(--sans);
        text-transform: uppercase;
        text-align: center;
      }

      p {
        font: large var(--sans);
      }

      pre,
      code {
        font: medium var(--mono);
      }

      a {
        text-decoration-thickness: from-font;
      }
    </style>

    <script type="module">
      import { marked } from "https://unpkg.com/marked"

      render(location + "/README.md")

      async function render(file) {
        const response = await fetch(file)
        if (!response.ok) return
        const markdown = await response.text()
        const html = marked.parse(markdown)
        document.body.innerHTML = html
      }
    </script>
  </head>
  <body>
    <p>Loading &hellip;</p>
  </body>
</html>
